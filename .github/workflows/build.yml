name: Build CI

on:
  push:
    branches: [ "master" ]
    paths: &paths
      - "meson.build"
      - "meson.options"
      - "meson_options.txt"
      - "src/**"
      - "man/**"
      - "completion/**"
      - "vim/**"
      - "tests/**"
      - ".github/**"

  pull_request:
    branches: [ "master" ]
    paths: *paths

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        env:
          - name: glibc
            container: ""
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                meson ninja-build pkg-config g++ \
                scdoc

          - name: musl
            container: "alpine:latest"
            install: |
              apk add --no-cache \
                build-base meson ninja pkgconf \
                scdoc

        cfg:
          - name: shared
            link_mode: shared

          - name: static
            link_mode: static

    name: ${{ matrix.env.name }} / ${{ matrix.cfg.name }}
    container: ${{ matrix.env.container != '' && matrix.env.container || null }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: ${{ matrix.env.install }}

      - name: Configure pkgman
        run: |
          meson setup build \
            --buildtype=plain \
            --wrap-mode=nodownload \
            --prefix=/usr \
            -D b_lto=true \
            -D b_pie=true \
            -D link_mode=${{ matrix.cfg.link_mode }}

      - name: Build pkgman
        run: meson compile -C build -v

      - name: Run pkgman tests
        run: meson test -C build -v

      - name: Install pkgman to staging
        run: DESTDIR="$PWD/stage" meson install -C build
